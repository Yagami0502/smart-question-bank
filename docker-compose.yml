services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: question-bank-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smart_question_bank
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    # No host port publish — the api reaches MySQL over the internal compose network.
    # Host 3306 is already used by a local MySQL; expose here only if external access is needed.
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  # 后端 API 服务
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: question-bank-api
    restart: always
    ports:
      - "3001:3001"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: app_user
      DB_PASSWORD: app_password
      DB_NAME: smart_question_bank
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    depends_on:
      mysql:
        condition: service_healthy

  # 前端 Nginx 服务
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: question-bank-web
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  mysql_data:
